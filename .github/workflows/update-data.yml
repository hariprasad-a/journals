name: Update Journal Data

on:
  schedule:
    - cron: '0 0 1 * *' # 1st of each month
  workflow_dispatch: # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch and process data
        env:
          OPENALEX_EMAIL: ${{ vars.OPENALEX_EMAIL }}
          ABDC_URL: ${{ vars.ABDC_URL }}
        run: npm run update-data

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data.json .enrichment-cache.json
          git diff --staged --quiet || git commit -m "chore: update journal data from ABDC + Scopus + OpenAlex" && git push
